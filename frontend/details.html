<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Details</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
  max-width: 600px;
  margin: auto;
  padding: 16px;
}

input{
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  background: #1e293b;
  color: white;
}

.calc-btn{
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #3b82f6;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

.info-box{
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.note{
  font-size: 12px;
  color: #facc15;
  margin-top: 6px;
}

.bottom-bar{
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.95);
  padding: 12px 16px;
}

.continue-btn{
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: gray;
  color: white;
}

.enabled{
  background: #22c55e;
}
</style>

</head>

<body>

<div class="container" id="main-content">

<h2>📦 Delivery Details</h2>

<input id="name" placeholder="Full Name" oninput="saveDetails()">
<input id="phone" placeholder="Phone Number" inputmode="numeric" oninput="saveDetails()">
<input id="address" placeholder="Full Address" oninput="saveDetails()">
<input id="pincode" placeholder="Pincode" inputmode="numeric" oninput="saveDetails()">

<button class="calc-btn" onclick="calculateShipping()">
Calculate Shipping
</button>

<div class="info-box">
  <p>Total Weight: <b><span id="weight">0</span> kg</b></p>
  <p>Shipping Cost: <b>₹<span id="shipping">0</span></b></p>
  <div class="note">* Based on India Post cheapest parcel estimation</div>
</div>

</div>

<div class="bottom-bar">
  <button id="continueBtn" class="continue-btn" disabled onclick="goNext()">
    Continue →
  </button>
</div>

<script>

// ===== STATE =====
let selected = JSON.parse(localStorage.getItem("selectedBooks")) || [];
let books = [];

// 🔥 RESET SHIPPING EVERY VISIT
localStorage.removeItem("shippingCost");
let shippingCost = 0;
let calculated = false;

function saveDetails() {
  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    pincode: document.getElementById("pincode").value
  };

  localStorage.setItem("userDetails", JSON.stringify(data));
}

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem("userDetails") || "{}");

  document.getElementById("name").value = saved.name || "";
  document.getElementById("phone").value = saved.phone || "";
  document.getElementById("address").value = saved.address || "";
  document.getElementById("pincode").value = saved.pincode || "";
  
  load();
};

// ===== LOAD INITIAL DATA =====
async function load(){
  try{
    // 🟢 PHASE 7A FIX: Use Cache instead of mandatory API fetch
    const cached = localStorage.getItem("booksCache");
    
    if (cached) {
      const parsed = JSON.parse(cached);
      books = parsed.data;
    } else {
      const res = await fetch("https://bookstore-backend-971c.onrender.com/books", { cache: "no-store" });
      books = await res.json();
    }

    let weight = 0;
    selected.forEach(id=>{
      const b = books.find(x=> Number(x.id) === Number(id));
      if(b) weight += b.weight;
    });

    document.getElementById("weight").innerText = weight;
    enableBtn(); 

  } catch(err){
    document.getElementById("main-content").innerHTML =
      "<div style='text-align:center; padding-top:50px;'>" +
      "❌ Failed to connect to server. <br><br>" +
      "<button class='calc-btn' onclick='location.reload()'>Retry</button>" +
      "</div>";
  }
}

// REALTIME RESET ON PIN CHANGE
document.getElementById("pincode").addEventListener("input", ()=>{
  calculated = false;
  shippingCost = 0;
  document.getElementById("shipping").innerText = 0;
  localStorage.removeItem("shippingCost");
  disableBtn();
  enableBtn(); 
});

document.getElementById("name").addEventListener("input", enableBtn);
document.getElementById("phone").addEventListener("input", enableBtn);
document.getElementById("address").addEventListener("input", enableBtn);

function enableBtn(){
  const name = document.getElementById("name");
  const phone = document.getElementById("phone");
  const address = document.getElementById("address");
  const pincode = document.getElementById("pincode");
  const continueBtn = document.getElementById("continueBtn");

  const valid =
    name.value.trim() !== "" &&
    address.value.trim() !== "" &&
    /^\d{10}$/.test(phone.value.trim()) &&
    /^\d{6}$/.test(pincode.value.trim()) &&
    calculated === true;

  continueBtn.disabled = !valid;
  
  if(valid){
    continueBtn.classList.add("enabled");
  } else {
    continueBtn.classList.remove("enabled");
  }
}

function disableBtn(){
  const btn = document.getElementById("continueBtn");
  btn.disabled = true;
  btn.classList.remove("enabled");
}

// SHIPPING CALCULATION LOGIC
function getChargeableWeight(weight){
  let volume = weight * 900;
  let side = Math.cbrt(volume);
  let volumetric = (side * side * side) / 5000;
  return Math.max(weight, volumetric);
}

function getCalibratedCost(weight){
  if(weight <= 1) return 80;
  if(weight <= 2) return 120;
  if(weight <= 3) return 160;
  if(weight <= 5) return 200;
  if(weight <= 10) return 300;
  return 300 + (weight - 10) * 25;
}

function calculateShipping(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  const pincode = document.getElementById("pincode").value.trim();

  if(name === "" || address === "" || !/^\d{10}$/.test(phone) || !/^\d{6}$/.test(pincode)){
    alert("Please fill all details correctly first.");
    return;
  }

  const origin = "752069";
  let weight = parseFloat(document.getElementById("weight").innerText);
  let chargeWeight = getChargeableWeight(weight);

  if(pincode === origin){ 
    shippingCost = 161; 
  } else {
    let base = getCalibratedCost(chargeWeight);
    let firstDigit = pincode[0];
    if(firstDigit === "7"){ base += 20; }
    else if(firstDigit === "1" || firstDigit === "2"){ base += 70; }
    else{ base += 40; }
    shippingCost = Math.round(base);
  }
  
  document.getElementById("shipping").innerText = shippingCost;
  calculated = true;
  localStorage.setItem("shippingCost", shippingCost);
  enableBtn();
}

// FINAL AVAILABILITY CHECK BEFORE NEXT PAGE
async function goNext(){
  if(!calculated){ alert("Calculate shipping first"); return; }
  
  const user = { 
    name: document.getElementById("name").value.trim(), 
    phone: document.getElementById("phone").value.trim(), 
    address: document.getElementById("address").value.trim(), 
    pincode: document.getElementById("pincode").value.trim() 
  };

  localStorage.setItem("userDetails", JSON.stringify(user));

  // 🟢 PHASE 7A FIX: Use already loaded 'books' array to avoid redundant fetch
  const latest = books;

  let removed = [];
  selected = selected.filter(id=>{
    const b = latest.find(x=> Number(x.id) === Number(id));
    if(!b || b.status !== "available"){ 
      removed.push(b?.name || "Book"); 
      return false; 
    }
    return true;
  });

  localStorage.setItem("selectedBooks", JSON.stringify(selected));

  if(removed.length > 0){
    alert("Some books became unavailable:\n" + removed.join("\n"));
    window.location.href = "index.html";
    return;
  }
  
  window.location.href = "summary.html";
}
</script>

</body>
</html>
