<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Successful</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.container{ max-width:600px; margin:auto; padding:16px; }
.success{ text-align:center; font-size:22px; margin-bottom:12px; color: #22c55e;}
.box{ background:#1e293b; padding:14px; border-radius:12px; margin-bottom:10px; }
pre { 
    background: #111827; color: #22c55e; padding: 20px; border-radius: 12px; 
    text-align: left; font-family: monospace; overflow-x: auto; white-space: pre-wrap; 
    margin: 20px 0; border: 1px solid #1f2937;
}
button{ width:100%; padding:14px; border:none; border-radius:10px; margin-top:10px; font-size:15px; cursor:pointer; }
.download{ background:#3b82f6; color: white; font-weight: bold; }
.home{ background:#22c55e; color: white; font-weight: bold; }
</style>
</head>

<body>
<div class="container">
    <div class="success">🎉 Order Successful!</div>
    
    <div class="box" style="text-align: center;">
        <p style="color: #9ca3af; margin-bottom: 5px;">Thank you for your purchase!</p>
        <p style="color: #22c55e; font-weight: bold;">Order ID: <span id="orderIdDisplay">N/A</span></p>
    </div>

    <pre id="receiptDisplay">Loading receipt...</pre>

    <button class="download" onclick="downloadReceipt()">⬇ Download Receipt (PDF)</button>
    <button class="home" onclick="goHome()">Back to Home</button>
</div>

<script>
const receipt = localStorage.getItem("finalReceipt");

if (receipt) {
    document.getElementById("receiptDisplay").innerText = receipt;
    
    // Extract Order ID using regex for the UI display
    const orderIdMatch = receipt.match(/🆔 Order ID: (.*)/);
    if (orderIdMatch) {
        document.getElementById("orderIdDisplay").innerText = orderIdMatch[1];
    }
} else {
    document.getElementById("receiptDisplay").innerText = "No receipt found. Please check your email/messages.";
}

async function downloadReceipt() {
  if (!receipt) return alert("No receipt found to download.");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // 🔥 CLEANUP (Phase 7A): Only replace symbols that break PDF rendering
  const cleanReceipt = receipt
    .replace(/₹/g, "Rs.");

  const lines = cleanReceipt.split("\n");

  let y = 10;
  doc.setFont("monospace");
  doc.setFontSize(10);

  lines.forEach(line => {
    doc.text(line, 10, y);
    y += 7;

    // Auto page break
    if (y > 280) {
      doc.addPage();
      y = 10;
    }
  });

  doc.save("Sourav_Bookstore_Receipt.pdf");
}

function goHome(){
    // Phase 7A: Cleanup logic - strictly remove data to prevent ghost selection
    localStorage.removeItem("selectedBooks");
    localStorage.removeItem("shippingCost");
    localStorage.removeItem("bundleApplied");
    localStorage.removeItem("finalReceipt");
    // paymentLock removed as per Phase 3/7A standards
    window.location.href = "index.html";
}
</script>
</body>
</html>
