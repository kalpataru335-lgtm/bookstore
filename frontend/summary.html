<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Summary</title>
<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
  .container { max-width: 600px; margin: auto; padding: 16px; }
  .box { background: #1e293b; padding: 16px; border-radius: 14px; margin-bottom: 12px; }
  .line { display: flex; justify-content: space-between; margin: 10px 0; }
  .final-line { color: #22c55e; font-size: 20px; font-weight: bold; }
  
  .terms-card {
    margin: 30px auto 180px auto;
    max-width: 600px;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #1f2937;
  }
</style>
</head>

<body>
<h2 style="text-align:center; margin: 20px 0;">🧾 Order Summary</h2>

<div class="container">
  <div id="list" class="box"></div>

  <div id="unavailableBox" class="box" style="display:none; border:1px solid #ef4444;">
    <b style="color: #ef4444;">❌ These books are unavailable:</b>
    <div id="unavailableList"></div>
  </div>

  <div class="box">
    <div class="line"><span>Books Total</span><span>₹<span id="total"></span></span></div>
    <div class="line"><span>Market Price</span><span class="strike">₹<span id="mrp"></span></span></div>
    <div class="line" style="background:rgba(34,197,94,0.15); padding:6px 10px; border-radius:8px; color:#22c55e;">
      <span>Bundle Discount</span><span>-₹<span id="bundle"></span></span>
    </div>
    <div class="line" style="color:#facc15;"><span>You Save</span><span>₹<span id="save"></span></span></div>
    <div class="line" style="color:#3b82f6;"><span>Shipping</span><span>₹<span id="shipping"></span></span></div>
    <div class="line final-line">
      <span>Final Payable</span><span>₹<span id="final"></span></span>
    </div>
  </div>

  <div class="terms-card">
    <label style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer;">
      <input type="checkbox" id="terms" style="width: 22px; height: 22px; margin-top: 4px; accent-color: #22c55e;">
      <div style="font-size: 14px; line-height: 1.6; color: #e5e7eb;">
        <b>I agree to the Terms & Conditions</b>
        <ul style="margin-top: 8px; padding-left: 18px;">
          <li>Payments are non-refundable</li>
          <li>Books are non-returnable after payment</li>
          <li>Books will be locked for 3 minutes after clicking Pay</li>
        </ul>
      </div>
    </label>
  </div>
</div>

<div class="bottom-bar">
  <button onclick="modify()" style="flex: 1; background: #64748b; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; cursor: pointer;">
    Modify Order
  </button>
  <button id="payBtn" onclick="pay()" style="flex: 1.2; background: #22c55e; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;">
    Pay Now
  </button>
</div>

<script>
let ids = JSON.parse(localStorage.getItem("selectedBooks")) || [];
let shipping = parseInt(localStorage.getItem("shippingCost")) || 0;
let books = [];
let calculatedTotal = 0;

async function load() {
  if(!localStorage.getItem("shippingCost")) { alert("Calculate shipping first"); window.location.href = "details.html"; return; }
  try {
    // Hardcoded Absolute URL
    const res = await fetch("https://bookstore-backend-971c.onrender.com/books", { cache: "no-store" });
    books = await res.json();
    let total=0, mrp=0, html="", rawTotal=0, unavailable = [];

    ids.forEach(id => {
      const b = books.find(x => x.id === id);
      if(b && b.status === "available") { 
        rawTotal += b.price; total += b.price; mrp += b.price * 4; 
        html += `<div class="line"><span>${b.name}</span><span>₹${b.price}</span></div>`; 
      } else { 
        unavailable.push(b?.name || "Book"); 
      }
    });

    ids = ids.filter(id => { const b = books.find(x => x.id === id); return b && b.status === "available"; });
    localStorage.setItem("selectedBooks", JSON.stringify(ids));

    if(ids.length === 0) { alert("All selected books are unavailable"); window.location.href = "index.html"; return; }

    const availableCount = books.filter(b => b.status === "available").length;
    const isBundle = ids.length === availableCount && availableCount > 0;
    let bundleDiscount = isBundle ? 100 : 0;
    
    calculatedTotal = total + shipping - bundleDiscount;

    document.getElementById("list").innerHTML = html;
    document.getElementById("unavailableBox").style.display = unavailable.length > 0 ? "block" : "none";
    document.getElementById("unavailableList").innerHTML = unavailable.map(x => `<p>${x}</p>`).join("");
    document.getElementById("total").innerText = total;
    document.getElementById("mrp").innerText = mrp;
    document.getElementById("bundle").innerText = bundleDiscount;
    document.getElementById("save").innerText = mrp - (total - bundleDiscount);
    document.getElementById("shipping").innerText = shipping;
    document.getElementById("final").innerText = calculatedTotal;
  } catch(err) { alert("Failed to load summary."); }
}

function modify() { localStorage.setItem("bundleApplied","false"); localStorage.removeItem("shippingCost"); window.location = "index.html"; }

async function pay() {
  const payBtn = document.getElementById("payBtn");
  
  // 🔒 Prevent duplicate payment (persistent)
  if (localStorage.getItem("paymentLock") === "true") return;

  localStorage.setItem("paymentLock", "true");
  window.paymentStarted = true;

  if(!ids || ids.length === 0) { 
    localStorage.removeItem("paymentLock");
    window.paymentStarted = false;
    alert("No books selected"); 
    return; 
  }
  if(!document.getElementById("terms").checked) { 
    localStorage.removeItem("paymentLock");
    window.paymentStarted = false;
    alert("Please accept terms & conditions"); 
    return; 
  }

  payBtn.disabled = true;
  payBtn.innerText = "Processing...";

  try {
    // Hardcoded Absolute URL
    const checkRes = await fetch("https://bookstore-backend-971c.onrender.com/books", { cache: "no-store" });
    const latest = await checkRes.json();
    let removed = [];
    ids = ids.filter(id => { 
      const b = latest.find(x => x.id === id); 
      if(!b || b.status !== "available") { removed.push(b?.name || "Book"); return false; }
      return true;
    });

    if(removed.length > 0) {
      alert("Some books were sold: " + removed.join(", "));
      window.paymentStarted = false;
      localStorage.removeItem("paymentLock");
      window.location.href = "index.html";
      return;
    }

    // Hardcoded Absolute URL
    const lockRes = await fetch("https://bookstore-backend-971c.onrender.com/lock-books", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ids: ids })
    });
    if(!lockRes.ok) throw new Error("Lock failed");

    // Hardcoded Absolute URL
    const response = await fetch("https://bookstore-backend-971c.onrender.com/create-order", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ amount: calculatedTotal })
    });
    const data = await response.json();

    const rzp = new Razorpay({
      key: "rzp_test_ShQgwiuuoAGYfq", 
      amount: data.amount,
      currency: "INR",
      order_id: data.id,
      handler: async function (response) {
        const user = JSON.parse(localStorage.getItem("userDetails") || "{}");
        try {
          // Hardcoded Absolute URL
          const confirmRes = await fetch("https://bookstore-backend-971c.onrender.com/confirm-order", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ids: ids, paymentId: response.razorpay_payment_id, amount: calculatedTotal,
              name: user.name, phone: user.phone, address: user.address, pincode: user.pincode
            })
          });
          
          const confirmData = await confirmRes.json();
          if(!confirmRes.ok) throw new Error("Confirmation failed");
          
          localStorage.setItem("finalReceipt", confirmData.receipt);
          localStorage.removeItem("paymentLock"); // Reset on success
          window.location.href = "thankyou.html";

        } catch (err) {
          alert("Payment done but record failed. Save Payment ID: " + response.razorpay_payment_id);
          window.paymentStarted = false;
          localStorage.removeItem("paymentLock"); // Reset on record failure
        }
      },
      modal: {
        ondismiss: async function () {
          console.log("Payment cancelled by user");

          try {
            // Hardcoded Absolute URL
            await fetch("https://bookstore-backend-971c.onrender.com/unlock-books", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ ids: ids })
            });
          } catch (e) {
            console.log("Unlock failed (non-critical)");
          }

          window.paymentStarted = false;
          localStorage.removeItem("paymentLock"); // Reset on cancel
          payBtn.disabled = false;
          payBtn.innerText = "Pay Now";

          alert("Payment cancelled. You can try again.");
        }
      }
    });
    rzp.open();
  } catch(err) {
    alert("System error. Please refresh.");
    window.paymentStarted = false;
    localStorage.removeItem("paymentLock"); // Reset on system error
    payBtn.disabled = false; payBtn.innerText = "Pay Now";
  }
}
load();
</script>
</body>
</html>
