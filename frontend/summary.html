<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Summary</title>
<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
  .container { max-width: 600px; margin: auto; padding: 16px; }
  .box { background: #1e293b; padding: 16px; border-radius: 14px; margin-bottom: 12px; }
  .line { display: flex; justify-content: space-between; margin: 10px 0; }
  .final-line { color: #22c55e; font-size: 20px; font-weight: bold; }
  .terms-card { margin: 30px auto 180px auto; background: #111827; padding: 20px; border-radius: 12px; border: 1px solid #1f2937; }
</style>
</head>

<body>
<h2 style="text-align:center; margin: 20px 0;">🧾 Order Summary</h2>
<div class="container">
  <div id="list" class="box"></div>
  <div id="unavailableBox" class="box" style="display:none; border:1px solid #ef4444;">
    <b style="color: #ef4444;">❌ These books are unavailable:</b>
    <div id="unavailableList"></div>
  </div>
  <div class="box">
    <div class="line"><span>Books Total</span><span>₹<span id="total"></span></span></div>
    <div class="line" style="background:rgba(34,197,94,0.15); padding:6px 10px; border-radius:8px; color:#22c55e;">
      <span>Bundle Discount</span><span>-₹<span id="bundle"></span></span>
    </div>
    <div class="line" style="color:#3b82f6;"><span>Shipping</span><span>₹<span id="shipping"></span></span></div>
    <div class="line final-line"><span>Final Payable</span><span>₹<span id="final"></span></span></div>
  </div>
  <div class="terms-card">
    <label style="display: flex; gap: 12px; cursor: pointer;">
      <input type="checkbox" id="terms" style="width: 22px; height: 22px; accent-color: #22c55e;">
      <div style="font-size: 14px; color: #e5e7eb;"><b>I agree to the Terms & Conditions</b></div>
    </label>
  </div>
</div>

<div class="bottom-bar">
  <button onclick="modify()" style="flex: 1; background: #64748b; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer;">Modify Order</button>
  <button id="payBtn" onclick="pay()" style="flex: 1.2; background: #22c55e; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer;">Pay Now</button>
</div>

<script>
const API = "https://bookstore-backend-971c.onrender.com";
let ids = JSON.parse(localStorage.getItem("selectedBooks")) || [];
let shipping = parseInt(localStorage.getItem("shippingCost")) || 0;
let books = [];
let calculatedTotal = 0;

async function load() {
  if(!localStorage.getItem("shippingCost")) { alert("Calculate shipping first"); window.location.href = "details.html"; return; }
  try {
    const res = await fetch(API + "/books", { cache: "no-store" });
    books = await res.json();
    let total=0, html="", unavailable = [];

    ids.forEach(id => {
      const b = books.find(x => x.id === id);
      if(b && b.status === "available") { 
        total += b.price; html += `<div class="line"><span>${b.name}</span><span>₹${b.price}</span></div>`; 
      } else { unavailable.push(b?.name || "Book"); }
    });

    ids = ids.filter(id => { const b = books.find(x => x.id === id); return b && b.status === "available"; });
    localStorage.setItem("selectedBooks", JSON.stringify(ids));

    const availableCount = books.filter(b => b.status === "available").length;
    const isBundle = ids.length === availableCount && availableCount > 0;
    let bundleDiscount = isBundle ? 100 : 0;
    calculatedTotal = total + shipping - bundleDiscount;

    document.getElementById("list").innerHTML = html;
    document.getElementById("unavailableBox").style.display = unavailable.length > 0 ? "block" : "none";
    document.getElementById("unavailableList").innerHTML = unavailable.map(x => `<p>${x}</p>`).join("");
    document.getElementById("total").innerText = total;
    document.getElementById("bundle").innerText = bundleDiscount;
    document.getElementById("shipping").innerText = shipping;
    document.getElementById("final").innerText = calculatedTotal;
    
    localStorage.setItem("finalAmount", calculatedTotal);
  } catch(err) { alert("Failed to load summary."); }
}

async function pay() {
  const payBtn = document.getElementById("payBtn");
  if (localStorage.getItem("paymentLock") === "true") return;
  localStorage.setItem("paymentLock", "true");

  if(!ids || ids.length === 0 || !document.getElementById("terms").checked) { 
    localStorage.removeItem("paymentLock"); alert("Verify selection and terms"); return; 
  }

  payBtn.disabled = true; payBtn.innerText = "Processing...";

  try {
    const checkRes = await fetch(API + "/books", { cache: "no-store" });
    const latest = await checkRes.json();
    ids = ids.filter(id => { 
      const b = latest.find(x => x.id === id); 
      return b && b.status === "available";
    });

    if(ids.length === 0) {
      alert("Books are no longer available.");
      localStorage.removeItem("paymentLock");
      window.location.href = "index.html";
      return;
    }

    await fetch(API + "/lock-books", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ids: ids })
    });

    const response = await fetch(API + "/create-order", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ amount: calculatedTotal })
    });
    const data = await response.json();

    // ✅ CRITICAL ISSUE 2 FIX: Validate order creation
    if (!data || !data.id) {
      alert("Order creation failed. Try again.");
      localStorage.removeItem("paymentLock");
      payBtn.disabled = false;
      payBtn.innerText = "Pay Now";
      return;
    }

    const options = {
      key: "rzp_test_ShQgwiuuoAGYfq", 
      amount: data.amount,
      currency: "INR",
      name: "Sourav Bookstore",
      order_id: data.id,
      handler: async function (response) {
        // ✅ CRITICAL ISSUE 1 FIX: Validate userDetails
        const user = JSON.parse(localStorage.getItem("userDetails"));
        if (!user || !user.name || !user.phone) {
          alert("User details missing. Please re-enter details.");
          localStorage.removeItem("paymentLock");
          return;
        }

        const amount = localStorage.getItem("finalAmount");

        const res = await fetch(API + "/confirm-order", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ids, paymentId: response.razorpay_payment_id, amount: amount,
            name: user.name, phone: user.phone, address: user.address, pincode: user.pincode
          })
        });
        const confirmData = await res.json();
        if (confirmData.success) {
          localStorage.setItem("finalReceipt", confirmData.receipt);
          localStorage.removeItem("paymentLock");
          window.location.href = "thankyou.html";
        }
      },
      modal: {
        ondismiss: function() { 
          localStorage.removeItem("paymentLock"); payBtn.disabled = false; payBtn.innerText = "Pay Now";
        }
      },
      theme: { color: "#22c55e" }
    };
    new Razorpay(options).open();
  } catch(err) { localStorage.removeItem("paymentLock"); payBtn.disabled = false; payBtn.innerText = "Pay Now"; }
}
load();
</script>
</body>
</html>
