<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Summary</title>

<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
.container{
  max-width:600px;
  margin:auto;
  padding:16px;
}
.box{
  background:#1e293b;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
}
.line{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}
.strike{
  text-decoration:line-through;
  color:#9ca3af;
}
.bundle{
  background:rgba(34,197,94,0.15);
  padding:6px 10px;
  border-radius:8px;
  color:#22c55e;
  transition: opacity 0.2s;
}
.shipping{
  color:#3b82f6;
}
.final{
  color:#22c55e;
  font-size:20px;
  font-weight:bold;
}
.bottom-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  padding:12px;
}
button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
.pay{ background:#22c55e; transition: opacity 0.2s; }
.modify{ background:#64748b; }
.terms-label{
  color: white;
  display: block;
  margin-bottom: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<h2 style="text-align:center;">🧾 Order Summary</h2>

<div class="container">

<div id="list" class="box"></div>

<div id="unavailableBox" class="box" style="display:none; border:1px solid #ef4444;">
  <b style="color: #ef4444;">❌ These books are unavailable:</b>
  <div id="unavailableList"></div>
</div>

<div class="box">

<div class="line">
<span>Books Total</span>
<span>₹<span id="total"></span></span>
</div>

<div class="line">
<span>Market Price</span>
<span class="strike">₹<span id="mrp"></span></span>
</div>

<div class="line bundle">
<span>Bundle Discount</span>
<span>-₹<span id="bundle"></span></span>
</div>

<div class="line" style="color:#facc15;">
<span>You Save</span>
<span>₹<span id="save"></span></span>
</div>

<div class="line shipping">
<span>Shipping</span>
<span>₹<span id="shipping"></span></span>
</div>

<div class="line final">
<span>Final Payable</span>
<span>₹<span id="final"></span></span>
</div>

</div>

</div>

<div class="bottom-bar">
<label class="terms-label">
  <input type="checkbox" id="terms">
  I agree to terms & conditions
</label>
<button class="modify" onclick="modify()">Modify Order</button>
<button id="payBtn" class="pay" onclick="pay()">Pay Now</button>
</div>

<script>

let ids = JSON.parse(localStorage.getItem("selectedBooks")) || [];
let shipping = parseInt(localStorage.getItem("shippingCost")) || 0;

let books = [];
let calculatedTotal = 0; // Secure state variable

// ===== INITIAL LOAD =====
async function load(){

  // 🔥 PROTECTION: REDIRECT IF SHIPPING NOT CALCULATED
  if(!localStorage.getItem("shippingCost")){
    alert("Please calculate shipping before proceeding");
    window.location.href = "details.html";
    return;
  }

  try{
    // 🔥 NO-CACHE FETCH FOR PRODUCTION
    const res = await fetch("https://bookstore-backend-971c.onrender.com/books", { cache: "no-store" });
    books = await res.json();

    let total=0, mrp=0, html="", rawTotal=0;
    let unavailable = [];

    ids.forEach(id=>{
      const b = books.find(x=>x.id === id);

      if(b && b.status === "available"){
        rawTotal += b.price;
        total += b.price;
        mrp += b.price * 4;
        html += `<div class="line"><span>${b.name}</span><span>₹${b.price}</span></div>`;
      }
      else{
        unavailable.push(b?.name || "Book");
      }
    });

    // SYNC STATE
    ids = ids.filter(id=>{
      const b = books.find(x=>x.id === id);
      return b && b.status === "available";
    });

    localStorage.setItem("selectedBooks", JSON.stringify(ids));

    // PROTECTION: EMPTY CART
    if(ids.length === 0){
      alert("All selected books are unavailable");
      window.location.href = "index.html";
      return;
    }

    // PROTECTION: MINIMUM ORDER (ONLY IF CART NOT EMPTY)
    if(ids.length > 0 && rawTotal < 160){
      alert("Order below ₹160. Please add more books.");
      setTimeout(()=>{ window.location.href = "index.html"; }, 500);
      return;
    }

    // BUNDLE DISCOUNT LOGIC
    let bundleDiscount = 0;
    const availableCount = books.filter(b => b.status === "available").length;
    const isBundle = ids.length === availableCount && availableCount > 0;

    if(isBundle){
      bundleDiscount = 100;
      total -= 100;
    }

    calculatedTotal = total + shipping; // Secure Internal Calculation
    
    // RENDER UI
    document.getElementById("list").innerHTML = html;
    
    // Reset/Show Unavailable Box
    const uBox = document.getElementById("unavailableBox");
    uBox.style.display = "none";
    if(unavailable.length > 0){
      uBox.style.display = "block";
      document.getElementById("unavailableList").innerHTML =
        unavailable.map(x => `<p>${x}</p>`).join("");
    }

    document.getElementById("total").innerText = total;
    document.getElementById("mrp").innerText = mrp;
    document.getElementById("bundle").innerText = bundleDiscount;
    document.querySelector(".bundle").style.opacity = isBundle ? "1" : "0.6";
    document.getElementById("save").innerText = mrp - total;
    document.getElementById("shipping").innerText = shipping;
    document.getElementById("final").innerText = calculatedTotal;

  }catch(err){
    alert("Failed to load summary data. Please retry.");
  }
}

function modify(){
  localStorage.setItem("bundleApplied","false");
  localStorage.removeItem("shippingCost");
  localStorage.removeItem("userDetails");
  window.location = "index.html";
}

// ===== SECURE PAYMENT FLOW =====
async function pay(){
  const payBtn = document.getElementById("payBtn");

  // 1. HARD ENFORCEMENT OF TERMS
  if(!document.getElementById("terms").checked){
    alert("Please accept terms & conditions");
    return;
  }

  // 2. DOUBLE-CLICK PROTECTION
  payBtn.disabled = true;
  payBtn.innerText = "Processing...";

  try {
    // 🔥 CHECK 2: FRESH AVAILABILITY CHECK
    const res = await fetch("https://bookstore-backend-971c.onrender.com/books", { cache: "no-store" });
    const latest = await res.json();

    let removed = [];
    ids = ids.filter(id=>{
      const b = latest.find(x=>x.id === id);
      if(!b || b.status !== "available"){
        removed.push(b?.name || "Book");
        return false;
      }
      return true;
    });

    if(removed.length > 0){
      alert("Some books were just sold:\n" + removed.join("\n"));
      payBtn.disabled = false; payBtn.innerText = "Pay Now";
      window.location.href = "index.html";
      return;
    }

    // 3. LOCK INVENTORY
    const lockRes = await fetch("https://bookstore-backend-971c.onrender.com/lock-books", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids: ids })
    });

    const lockData = await lockRes.json();
    if(!lockData.success){
      alert("Inventory sync failed. Books no longer available.");
      payBtn.disabled = false; payBtn.innerText = "Pay Now";
      window.location.href = "index.html";
      return;
    }

    // 4. CREATE RAZORPAY ORDER
    const response = await fetch("https://bookstore-backend-971c.onrender.com/create-order",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ amount: calculatedTotal })
    });

    const data = await response.json();
    if(!data.id){
      alert("Order creation failed. Contact support.");
      payBtn.disabled = false; payBtn.innerText = "Pay Now";
      return;
    }

    // 5. INITIALIZE CHECKOUT
    const rzp = new Razorpay({
      key: "rzp_test_SguP9aeomm5pPh", // Replace with LIVE Key eventually
      amount: data.amount,
      currency: "INR",
      order_id: data.id,

      handler: async function (response) {
        // 🔥 VERIFY + SYNC
        const vRes = await fetch("https://bookstore-backend-971c.onrender.com/verify-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            paymentId: response.razorpay_payment_id,
            ids: ids
          })
        });

        const vData = await vRes.json();
        if(vData.success){
          window.location.href = "thankyou.html";
        } else {
          alert("Payment verification failed. Unlocking books.");
          await fetch("https://bookstore-backend-971c.onrender.com/unlock-books", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ids: ids })
          });
          payBtn.disabled = false; payBtn.innerText = "Pay Now";
        }
      },

      modal:{
        ondismiss: async function(){
          payBtn.disabled = false; payBtn.innerText = "Pay Now";
          await fetch("https://bookstore-backend-971c.onrender.com/unlock-books", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ids: ids })
          });
        }
      }
    });

    rzp.on('payment.failed', async function (response) {
      alert("Payment failed. Inventory released.");
      payBtn.disabled = false; payBtn.innerText = "Pay Now";
      await fetch("https://bookstore-backend-971c.onrender.com/unlock-books", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: ids })
      });
    });

    rzp.open();

  } catch(err) {
    // 🔥 STABILITY: UNLOCK ON SERVER ERROR
    alert("An unexpected error occurred. Please try again.");
    await fetch("https://bookstore-backend-971c.onrender.com/unlock-books", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids: ids })
    });
    payBtn.disabled = false; payBtn.innerText = "Pay Now";
  }
}

// TERMS LOGIC
const payBtn = document.getElementById("payBtn");
const terms = document.getElementById("terms");

payBtn.disabled = true;
payBtn.style.opacity = "0.5";

terms.addEventListener("change", ()=>{
  payBtn.disabled = !terms.checked;
  payBtn.style.opacity = terms.checked ? "1" : "0.5";
});

load();

</script>

</body>
</html>
