<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Summary</title>

<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
.container{
  max-width:600px;
  margin:auto;
  padding:16px;
}
.box{
  background:#1e293b;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
}
.line{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}
.strike{
  text-decoration:line-through;
  color:#9ca3af;
}
.bundle{
  background:rgba(34,197,94,0.15);
  padding:6px 10px;
  border-radius:8px;
  color:#22c55e;
}
.shipping{
  color:#3b82f6;
}
.final{
  color:#22c55e;
  font-size:20px;
  font-weight:bold;
}
.bottom-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  padding:12px;
}
button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
.pay{ background:#22c55e; transition: opacity 0.2s; }
.modify{ background:#64748b; }
.terms-label{
  color: white;
  display: block;
  margin-bottom: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<h2 style="text-align:center;">🧾 Order Summary</h2>

<div class="container">

<div id="list" class="box"></div>

<div class="box">

<div class="line">
<span>Books Total</span>
<span>₹<span id="total"></span></span>
</div>

<div class="line">
<span>Market Price</span>
<span class="strike">₹<span id="mrp"></span></span>
</div>

<div class="line bundle">
<span>Bundle Discount</span>
<span>-₹<span id="bundle"></span></span>
</div>

<div class="line" style="color:#facc15;">
<span>You Save</span>
<span>₹<span id="save"></span></span>
</div>

<div class="line shipping">
<span>Shipping</span>
<span>₹<span id="shipping"></span></span>
</div>

<div class="line final">
<span>Final Payable</span>
<span>₹<span id="final"></span></span>
</div>

</div>

</div>

<div class="bottom-bar">
<label class="terms-label">
  <input type="checkbox" id="terms">
  I agree to terms & conditions
</label>
<button class="modify" onclick="modify()">Modify Order</button>
<button id="payBtn" class="pay" onclick="pay()">Pay Now</button>
</div>

<script>

let ids = JSON.parse(localStorage.getItem("selectedBooks")) || [];
let bundle = localStorage.getItem("bundleApplied") === "true";
let shipping = parseInt(localStorage.getItem("shippingCost")) || 0;

let books = [];

async function load(){

  try{
    const res = await fetch("https://bookstore-backend-971c.onrender.com/books");
    books = await res.json();

    let total=0, mrp=0, html="", rawTotal=0;

    ids.forEach(id=>{
      const b = books.find(x=>x.id === id);
      if(b){
        rawTotal += b.price;
        total += b.price;
        mrp += b.price * 4;
        html += `<p>${b.name} — ₹${b.price}</p>`;
      }
    });

    if(rawTotal < 160){
      alert("Order below ₹160");
      window.location.href = "index.html";
      return;
    }

    let bundleDiscount = 0;
    const availableCount = books.filter(b => b.status === "available").length;

    if(bundle && ids.length === availableCount && availableCount > 0){
      bundleDiscount = 100;
      total -= 100;
    }

    let final = total + shipping;
    const youSave = mrp - total;

    document.getElementById("list").innerHTML = html;
    document.getElementById("total").innerText = total;
    document.getElementById("mrp").innerText = mrp;
    document.getElementById("bundle").innerText = bundleDiscount;
    document.getElementById("save").innerText = youSave;
    document.getElementById("shipping").innerText = shipping;
    document.getElementById("final").innerText = final;

  }catch(err){
    alert("Failed to load data");
  }
}

function modify(){
  window.location = "index.html";
}

// 🔥 FINAL FIXED PAYMENT
async function pay(){

  // 🔥 CHECK 2 — recheck availability before payment
  const res = await fetch("http://127.0.0.1:3000/books");
  const latest = await res.json();

  let removed = [];

  ids = ids.filter(id=>{
    const b = latest.find(x=>x.id === id);
    if(!b || b.status !== "available"){
      removed.push(b?.name || "Book");
      return false;
    }
    return true;
  });

  localStorage.setItem("selectedBooks", JSON.stringify(ids));

  if(removed.length > 0){
    alert("Some books were just sold:\n" + removed.join("\n"));
    window.location.href = "index.html";
    return;
  }

  if(ids.length === 0){
    alert("No books selected");
    return;
  }

  // 🔒 LOCK BOOKS
  const lockRes = await fetch("http://127.0.0.1:3000/lock-books", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ids: ids })
  });

  const lockData = await lockRes.json();

  if(!lockData.success){
    alert("Some books are no longer available");
    window.location.href = "index.html";
    return;
  }

  try{

    let amount = parseInt(document.getElementById("final").innerText);

    if(!amount || amount <= 0){
      alert("Invalid amount");
      return;
    }

    const response = await fetch("http://127.0.0.1:3000/create-order",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ amount })
    });

    const data = await response.json();

    console.log("ORDER RESPONSE:", data);

    // ❌ HANDLE BACKEND FAILURE
    if(!data.id){
      alert("Order creation failed. Check backend or Razorpay keys.");
      return;
    }

    const rzp = new Razorpay({
      key: "rzp_test_SguP9aeomm5pPh", // replace
      amount: data.amount,
      currency: "INR",
      order_id: data.id,

      handler: async function (response) {
        // ✅ VERIFY + MARK SOLD
        await fetch("http://127.0.0.1:3000/verify-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            paymentId: response.razorpay_payment_id,
            ids: ids
          })
        });

        window.location.href = "thankyou.html";
      },

      modal:{
        ondismiss: async function(){
          console.log("Payment popup closed");
          // 🔓 UNLOCK BOOKS
          await fetch("http://127.0.0.1:3000/unlock-books", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ids: ids })
          });
        }
      }
    });

    rzp.on('payment.failed', async function (response) {
      console.log("FAIL:", response.error);
      alert("Payment failed. Try again.");

      // 🔓 UNLOCK BOOKS (IMPORTANT FIX)
      await fetch("http://127.0.0.1:3000/unlock-books", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: ids })
      });
    });

    rzp.open();

  }catch(err){
    console.log("ERROR:", err);
    alert("Server not responding. Make sure backend is running.");
  }
}

// TERMS CHECKBOX LOGIC
const payBtn = document.getElementById("payBtn");
const terms = document.getElementById("terms");

payBtn.disabled = true;
payBtn.style.opacity = "0.5";

terms.addEventListener("change", ()=>{
  payBtn.disabled = !terms.checked;
  payBtn.style.opacity = terms.checked ? "1" : "0.5";
});

load();

</script>

</body>
</html>
